version: '3.8'

services:
  server:
    build: ./server
    container_name: prof-portfolio-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    networks:
      - app-network

  client:
    build: ./client
    container_name: prof-portfolio-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
