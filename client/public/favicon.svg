<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Obsidian Dark Background Gradient -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <!-- Silver / Crisp White Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e4e4e7" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <!-- Sleek Gold Accent Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b59410" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
  </defs>

  <!-- Background Shield in Obsidian Black -->
  <path d="M256,40 C140,80 80,180 80,300 C80,410 160,480 256,500 C352,480 432,410 432,300 C432,180 372,80 256,40 Z" fill="url(#shield-grad)" stroke="#27272a" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Inner Shield Border -->
  <path d="M256,70 C160,105 110,190 110,290 C110,380 175,440 256,460 C337,440 402,380 402,290 C402,190 352,105 256,70 Z" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="4"/>

  <!-- Academic / Security Emblem: Graduation Cap + Cyber Nodes -->
  <!-- Cap Diamond top (Silver/White) -->
  <polygon points="256,150 370,200 256,250 142,200" fill="url(#accent-grad)"/>
  
  <!-- Cap Skull/Base -->
  <path d="M190,230 L190,280 C190,310 210,330 256,330 C302,330 322,310 322,280 L322,230" fill="none" stroke="url(#accent-grad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Tassel (Gold Accent) -->
  <path d="M310,220 L340,250 L340,290" fill="none" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="340" cy="295" r="8" fill="url(#gold-grad)"/>

  <!-- Trustworthy AI / Cyber Security Lines (Sleek Silver/White) -->
  <circle cx="256" cy="380" r="10" fill="#ffffff" />
  <circle cx="200" cy="410" r="8" fill="url(#accent-grad)" />
  <circle cx="312" cy="410" r="8" fill="url(#accent-grad)" />
  
  <line x1="256" y1="380" x2="200" y2="410" stroke="url(#accent-grad)" stroke-width="4" opacity="0.8" />
  <line x1="256" y1="380" x2="312" y2="410" stroke="url(#accent-grad)" stroke-width="4" opacity="0.8" />
  <line x1="256" y1="330" x2="256" y2="380" stroke="url(#accent-grad)" stroke-width="4" opacity="0.8" />
</svg>